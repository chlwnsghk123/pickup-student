<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>답변자 추첨기</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  overflow:hidden;
  font-family:'Noto Sans KR',sans-serif;
  user-select:none;
  background:#111;
  display:flex; align-items:center; justify-content:center;
}
#stage {
  position:relative;
  width:800px; height:600px; /* JS로 자동 조정 */
  overflow:hidden;
  box-shadow:0 10px 50px rgba(0,0,0,0.7);
  border-radius:14px;
  flex-shrink:0;
  transform-origin: center center; /* 모바일 스케일링 기준점 */
}
#bg-canvas { position:absolute; inset:0; z-index:0; }
#scene      { position:absolute; inset:0; z-index:2; pointer-events:none; }
#fireworks  { position:absolute; inset:0; z-index:8; pointer-events:none; }

/* ── 이름 카드 ── */
.name-card {
  position:absolute;
  border-radius:22px;
  padding:8px 16px;
  font-size:16px;
  font-weight:900;
  white-space:nowrap;
  z-index:3;
}
.name-card.caught { z-index:6; }

/* ── 교수 ── */
#professor {
  position:absolute;
  z-index:5;
  width:100px;
}
#prof-body {
  position:relative;
  width:100px;
  display:flex;
  flex-direction:column;
  align-items:center;
  transform-origin:center top;
}
/* 얼굴: mix-blend-mode + 배경제거 느낌, 원형 클립 */
#prof-face {
  width:88px; height:88px;
  border-radius:50%;
  overflow:hidden;
  position:relative; z-index:2;
  flex-shrink:0;
  box-shadow: 0 0 0 2.5px rgba(255,255,255,0.5), 0 4px 18px rgba(0,0,0,0.55);
  background: transparent;
}
#prof-face img {
  width:112%; height:112%;
  object-fit:cover;
  object-position:center 8%;
  margin-left:-6%; margin-top:-3%;
  display:block;
  mix-blend-mode: multiply;
  filter: contrast(1.08) saturate(1.1);
}
#prof-torso {
  width:50px; height:44px;
  border-radius:8px 8px 4px 4px;
  margin-top:-8px;
  position:relative; z-index:1;
}
#prof-torso::after {
  content:'';
  position:absolute;
  top:7px; left:50%; transform:translateX(-50%);
  width:10px; height:21px;
  clip-path:polygon(30% 0%,70% 0%,85% 55%,50% 100%,15% 55%);
  background:var(--tie-color,#e74c3c);
}
#prof-left-arm, #prof-right-arm {
  position:absolute; top:9px;
  width:13px; height:34px;
  border-radius:7px;
  transform-origin:top center;
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
#prof-left-arm  { left:-12px;  transform:rotate(15deg); }
#prof-right-arm { right:-12px; transform:rotate(-15deg); }
#prof-left-arm::after, #prof-right-arm::after {
  content:'✊';
  position:absolute; bottom:-13px;
  font-size:13px; left:50%; transform:translateX(-50%);
}
#prof-legs { display:flex; gap:6px; margin-top:2px; }
.leg {
  width:13px; height:28px;
  border-radius:5px;
  transform-origin:top center;
  position:relative;
}
.leg::after {
  content:'';
  position:absolute;
  bottom:-5px; left:-4px;
  width:21px; height:8px;
  border-radius:4px;
  background:var(--shoe-color,#111);
}
.walk-right .leg.left  { animation:walkL 0.34s ease-in-out infinite alternate; }
.walk-right .leg.right { animation:walkR 0.34s ease-in-out infinite alternate; }
.walk-left  .leg.left  { animation:walkR 0.34s ease-in-out infinite alternate; }
.walk-left  .leg.right { animation:walkL 0.34s ease-in-out infinite alternate; }
@keyframes walkL { from{transform:rotate(-18deg)} to{transform:rotate(18deg)} }
@keyframes walkR { from{transform:rotate(18deg)}  to{transform:rotate(-18deg)} }
.stopped .leg { animation:none !important; transform:rotate(0deg) !important; }

/* 팔 뻗기 */
#prof-body.reach-fwd #prof-right-arm { transform:rotate(-118deg) !important; }
/* 슈퍼맨 팔 */
#prof-body.superman-arm #prof-right-arm { transform:rotate(-158deg) !important; transition:transform 0.3s ease !important; }
#prof-body.superman-arm #prof-left-arm  { transform:rotate(28deg)  !important; transition:transform 0.3s ease !important; }

/* 말풍선 */
#speech-bubble {
  position:absolute;
  bottom:calc(100% + 8px);
  left:50%;
  transform:translateX(-50%);
  background:white;
  color:#222; font-size:13px; font-weight:800;
  padding:8px 14px; border-radius:16px;
  white-space:nowrap;
  box-shadow:0 3px 10px rgba(0,0,0,0.2);
  opacity:0; transition:opacity 0.3s;
  pointer-events:none; z-index:10;
  transform-origin:center bottom;
}
#speech-bubble::after {
  content:'';
  position:absolute;
  bottom:-8px; left:50%; transform:translateX(-50%);
  border:8px solid transparent;
  border-top-color:white; border-bottom:none;
}
#speech-bubble.visible { opacity:1; }

/* 점프 */
@keyframes profJump {
  0%   { transform:translateY(0); }
  38%  { transform:translateY(-130px); }
  100% { transform:translateY(0); }
}
#professor.jumping { animation:profJump 1.1s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }

/* 슈퍼맨 날기 */
@keyframes profFlyRight {
  0%   { transform:translateY(0) rotate(0deg); }
  18%  { transform:translateY(-70px) rotate(-28deg); }
  62%  { transform:translateY(-85px) rotate(-22deg); }
  88%  { transform:translateY(-20px) rotate(-4deg); }
  100% { transform:translateY(0) rotate(0deg); }
}
@keyframes profFlyLeft {
  0%   { transform:translateY(0) rotate(0deg); }
  18%  { transform:translateY(-70px) rotate(28deg); }
  62%  { transform:translateY(-85px) rotate(22deg); }
  88%  { transform:translateY(-20px) rotate(4deg); }
  100% { transform:translateY(0) rotate(0deg); }
}
#professor.superman-right { animation:profFlyRight 1.8s cubic-bezier(0.4,0,0.2,1) forwards; }
#professor.superman-left  { animation:profFlyLeft  1.8s cubic-bezier(0.4,0,0.2,1) forwards; }

/* 카드 등장 */
@keyframes cardFlyIn {
  0%   { transform:scale(0.7) translateY(-20px); opacity:0.6; }
  60%  { transform:scale(1.45) translateY(-5px); opacity:1; }
  100% { transform:scale(1.25); opacity:1; }
}
.card-caught-anim { animation:cardFlyIn 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards; }

/* 입장 애니메이션 */
@keyframes enterFromLeft {
  from { left:-120px; }
  to   { left:var(--entry-target); }
}
@keyframes enterFromRight {
  from { left:920px; }
  to   { left:var(--entry-target); }
}
#professor.entering-left  { animation:enterFromLeft  2.2s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
#professor.entering-right { animation:enterFromRight 2.2s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }

/* ── UI ── */
#ui {
  position:absolute;
  bottom:16px; left:50%; transform:translateX(-50%);
  z-index:20; display:flex; gap:10px; align-items:center;
}
#stop-btn {
  font-family:'Black Han Sans',sans-serif; font-size:18px;
  padding:12px 38px;
  color:white; border:none; border-radius:50px; cursor:pointer;
  transition:transform 0.1s, box-shadow 0.1s;
  letter-spacing:2px;
}
#stop-btn:hover { transform:scale(1.05); }
#stop-btn:active { transform:scale(0.96); }
#stop-btn:disabled { opacity:0.35; pointer-events:none; cursor:default; }
  
  /* 모바일 대응 */
  @media (max-width: 600px) {
    #stop-btn, #reset-btn { padding: 10px 24px; font-size: 16px; }
    #ui { bottom: 10px; }
  }

#reset-btn {
  font-family:'Black Han Sans',sans-serif; font-size:18px;
  padding:12px 38px;
  border-radius:50px; cursor:pointer; display:none;
  border:2px solid rgba(255,255,255,0.5);
  background:rgba(60,180,100,0.85); color:white;
  box-shadow:0 5px 18px rgba(40,160,80,0.5);
  letter-spacing:2px;
  transition:background 0.2s, transform 0.1s;
}
#reset-btn:hover { background:rgba(60,200,110,0.95); transform:scale(1.04); }
/* 테마 표시 */
#theme-label {
  position:absolute; top:12px; left:14px;
  font-size:12px; padding:7px 14px;
  background:rgba(0,0,0,0.4); color:white;
  border:1px solid rgba(255,255,255,0.18); border-radius:18px;
  z-index:20; backdrop-filter:blur(4px);
  font-weight:700;
}

/* ── 결과 패널 ── */
#result-panel {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%) scale(0);
  border-radius:24px; padding:36px 60px;
  text-align:center; z-index:25;
  transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
  backdrop-filter:blur(20px);
  min-width:280px;
}
#result-panel.show { transform:translate(-50%,-50%) scale(1); }
#result-label { font-size:13px; opacity:0.65; margin-bottom:10px; font-weight:700; letter-spacing:2px; }
#result-name {
  font-family:'Black Han Sans',sans-serif; font-size:48px;
  margin-bottom:8px;
}
#result-sub { font-size:22px; opacity:0.9; }

/* ── 시작 메뉴 ── */
#start-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.85);
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(10px);
}
.menu-box {
  text-align: center; color: white;
  background: rgba(255,255,255,0.1);
  padding: 40px 60px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
.menu-box h1 { font-family: 'Black Han Sans'; font-size: 40px; margin-bottom: 10px; }
.menu-box p { font-size: 18px; opacity: 0.7; margin-bottom: 30px; }
.menu-btns { display: flex; gap: 20px; justify-content: center; }
.menu-btns button {
  font-family: 'Black Han Sans'; font-size: 24px;
  padding: 15px 40px; border: none; border-radius: 12px;
  cursor: pointer; transition: transform 0.2s, background 0.2s;
}
.menu-btns button:first-child { background: #3498db; color: white; }
.menu-btns button:last-child { background: #e74c3c; color: white; }
.menu-btns button:hover { transform: scale(1.05); filter: brightness(1.1); }
</style>
</head>

<script>
// ════════════════════════════════════
//  오디오 (Web Audio API - 라이브러리 없음)
// ════════════════════════════════════
const AC = new (window.AudioContext || window.webkitAudioContext)();
function resumeAC(){ if(AC.state==='suspended') AC.resume(); }

function playTone(freq, type='sine', dur=0.3, vol=0.18, delay=0){
  const o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type=type; o.frequency.value=freq;
  const t=AC.currentTime+delay;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t); o.stop(t+dur+0.05);
}

// 걷기 발소리 (메트로놈)
let stepInterval=null;
let stepPhase=0;
function startSteps(){
  stopSteps();
  stepInterval=setInterval(()=>{
    stepPhase=(stepPhase+1)%2;
    const freq=stepPhase===0?220:200;
    playTone(freq,'sine',0.12,0.06);
  },420);
}
function stopSteps(){ clearInterval(stepInterval); stepInterval=null; }

// 입장 팡파레 (단순 멜로디)
function playEntrance(){
  const notes=[523,659,784,1047];
  notes.forEach((f,i)=>playTone(f,'triangle',0.25,0.18,i*0.18));
}

// 멈춤 효과음
function playStop(){
  playTone(440,'sawtooth',0.15,0.12);
  playTone(330,'sawtooth',0.1,0.12,0.12);
}

// 점프 효과음
function playJump(){
  const o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type='sine';
  o.frequency.setValueAtTime(300,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(800,AC.currentTime+0.3);
  g.gain.setValueAtTime(0.15,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.35);
  o.start(AC.currentTime); o.stop(AC.currentTime+0.4);
}

// 슈퍼맨 효과음
function playSuperman(){
  // whoosh
  const buf=AC.createBuffer(1,AC.sampleRate*0.5,AC.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,1.5);
  const src=AC.createBufferSource(), g=AC.createGain();
  const filt=AC.createBiquadFilter(); filt.type='bandpass'; filt.frequency.value=800;
  src.buffer=buf; src.connect(filt); filt.connect(g); g.connect(AC.destination);
  g.gain.setValueAtTime(0.3,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.5);
  src.start(); src.stop(AC.currentTime+0.55);
  // 상승 음
  const o=AC.createOscillator(), g2=AC.createGain();
  o.connect(g2); g2.connect(AC.destination);
  o.type='sawtooth';
  o.frequency.setValueAtTime(200,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(1200,AC.currentTime+0.6);

// 도심: 재즈 느낌 스윙 화음
function startBgMusicCity(masterGain){
  const chords=[[196,247,294,370],[220,277,330,415],[175,220,261,329],[196,247,294,370]];
  let ci=0;
  function playBar(){
    if(!bgMusicActive) return;
    const chord=chords[ci%chords.length]; ci++;
    chord.forEach((f,i)=>{
      const o=AC.createOscillator(), g=AC.createGain();
      o.connect(g); g.connect(masterGain);
      o.type='triangle'; o.frequency.value=f;
      const t=AC.currentTime+i*0.04;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.35,t+0.06);
      g.gain.exponentialRampToValueAtTime(0.001,t+1.6);
      o.start(t); o.stop(t+1.7);
    });
    // 베이스
    const ob=AC.createOscillator(), gb=AC.createGain();
    ob.connect(gb); gb.connect(masterGain);
    ob.type='sine'; ob.frequency.value=chord[0]/2;
    gb.gain.setValueAtTime(0.5,AC.currentTime); gb.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+1.9);
    ob.start(AC.currentTime); ob.stop(AC.currentTime+2.0);
    setTimeout(playBar,1900);
  }
  playBar();
}

// 교실: 조용한 피아노 멜로디
function startBgMusicClassroom(masterGain){
  // 학교 종 느낌 솔-미-라-솔
  const melody=[392,330,440,392, 349,294,392,349, 392,440,523,494, 440,392,330,294];
  let mi=0;
  function playNote(){
    if(!bgMusicActive) return;
    const f=melody[mi%melody.length]; mi++;
    const o=AC.createOscillator(), g=AC.createGain();
    o.connect(g); g.connect(masterGain);
    o.type='sine';
    o.frequency.setValueAtTime(f,AC.currentTime);
    g.gain.setValueAtTime(0,AC.currentTime);
    g.gain.linearRampToValueAtTime(0.8,AC.currentTime+0.04);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.55);
    o.start(AC.currentTime); o.stop(AC.currentTime+0.6);
    // 화음
    const o2=AC.createOscillator(), g2=AC.createGain();
    o2.connect(g2); g2.connect(masterGain);
    o2.type='triangle'; o2.frequency.value=f*1.5;
    g2.gain.setValueAtTime(0,AC.currentTime); g2.gain.linearRampToValueAtTime(0.15,AC.currentTime+0.04);
    g2.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.4);
    o2.start(AC.currentTime); o2.stop(AC.currentTime+0.45);
    setTimeout(playNote, mi%4===0?700:360);
  }
  playNote();
}

    bgMusicGain=null;
  }
}

// 화면 크기에 맞춰 스테이지 스케일 조정 (모바일 최적화)
function fitStage(){
  const winW = window.innerWidth;
  const winH = window.innerHeight;
  const scale = Math.min(winW / SW, winH / SH, 1); // 화면보다 크면 축소, 작으면 1배
  const stage = document.getElementById('stage');
  stage.style.transform = `scale(${scale})`;
}

  const th=THEMES[currentTheme];

    el.style.left=x+'px'; el.style.top=y+'px';

    const ang=Math.random()*Math.PI*2;
    cards.push({el,name,x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,w:0,h:0,caught:false});

// ════════════════════════════════════
//  이동
// ════════════════════════════════════
function moveCards(){
  const groundY=SH-GROUND_OFFSET;
  const profCX = profX + 50; // 교수님 중심 X좌표

  cards.forEach((c1, i)=>{
    if(c1.caught) return;

    // 카드끼리 충돌 방지 (부드럽게)
    for (let j = i + 1; j < cards.length; j++) {
      const c2 = cards[j];
      if (c2.caught) continue;

      const dx = (c1.x + c1.w / 2) - (c2.x + c2.w / 2);
      const dy = (c1.y + c1.h / 2) - (c2.y + c2.h / 2);
      const dist = Math.hypot(dx, dy);
      const min_dist = (c1.w + c2.w) / 2 * 0.85; // 겹치기 시작하는 거리

      if (dist < min_dist) {
        const overlap = min_dist - dist;
        const force = overlap * 0.05; // 밀어내는 힘
        const angle = Math.atan2(dy, dx);
        c1.vx += Math.cos(angle) * force;
        c1.vy += Math.sin(angle) * force;
        c2.vx -= Math.cos(angle) * force;
        c2.vy -= Math.sin(angle) * force;
      }
    }

    // 교수님이 걸을 때(탐색 중) 가까이 오면 도망가기
    if(phase === 'walking'){
      const cardCX = c1.x + c1.w/2;
      const dist = Math.abs(cardCX - profCX);
      const runawayDist = 120; // 이 거리 안으로 들어오면 도망 시작
      if(dist < runawayDist){
        const force = (1 - dist/runawayDist) * 0.25;
        c1.vx += (cardCX > profCX ? 1 : -1) * force;
      }
    }

    c1.x+=c1.vx; c1.y+=c1.vy;
    if(c1.x<0){c1.x=0;c1.vx*=-1;}
    if(c1.x>SW-c1.w-8){c1.x=SW-c1.w-8;c1.vx*=-1;}
    if(c1.y<0){c1.y=0;c1.vy*=-1;}
    if(c1.y>groundY-c1.h-8){c1.y=groundY-c1.h-8;c1.vy*=-1;}
    c1.el.style.left=c1.x+'px'; c1.el.style.top=c1.y+'px';
  });
}

function doEntrance(){
  phase='entering';
  stopBtn.disabled=true;
  // 랜덤 방향에서 입장
  const fromLeft=Math.random()>.5;
  profDir=fromLeft?1:-1;
  profX=fromLeft?-120:SW+20;
  const targetX=fromLeft?80:SW-180;
  prof.style.left=profX+'px';
  prof.style.bottom=(GROUND_OFFSET-2)+'px';
  updateProfVisual();
  prof.classList.add('stopped'); // 다리 멈춤 해제 후 걷기
  profBody.classList.remove('stopped');

  // CSS 트랜지션으로 천천히 입장
  prof.style.transition='left 2.4s cubic-bezier(0.25,0.46,0.45,0.94)';
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      prof.style.left=targetX+'px';
    });
  });

  playEntrance();

  setTimeout(()=>{
    prof.style.transition='';
    profX=targetX;
    prof.classList.remove('stopped');
    phase='ready';
    stopBtn.disabled=false;   // 걷기 시작할 때 활성화
    stopBtn.style.display='block';
    resetBtn.style.display='none';
  },2500);
}

//  카드 선택 (가까운 것 위주)
//  GRAB_DIST: 손으로 잡기, JUMP_DIST: 점프로 잡기,
//  SUPER_DIST: 슈퍼맨 (낮은 확률)
// ════════════════════════════════════
const GRAB_DIST=120, JUMP_DIST=260, SUPER_DIST=380;

function pickCard(){
  const avail=cards.filter(c=>!c.caught);
  if(!avail.length) return null;
  const px=profX+50, py=SH-GROUND_OFFSET-80;
  
  // 방향에 맞는 후보군 필터링 (자연스러움을 위해)
  // 오른쪽(1) 보고 있으면 교수보다 오른쪽에 있는 카드, 왼쪽(-1)이면 왼쪽에 있는 카드 우선
  let candidates = avail.filter(c => {
    const cx = c.x + c.w/2;
    return (profDir === 1) ? (cx >= px) : (cx <= px);
  });
  // 만약 해당 방향에 카드가 하나도 없으면 전체 중에서 찾음
  if(candidates.length === 0) candidates = avail;

  const dists=candidates.map(c=>({c,d:Math.hypot(c.x+c.w/2-px,c.y+c.h/2-py)}));
  const sorted=dists.slice().sort((a,b)=>a.d-b.d);
  const nearest=sorted[0];
  const farthest=sorted[sorted.length-1];
  // 20% 확률로 슈퍼맨 (가장 먼 카드를 잡음!)
  if(Math.random()<0.20){ farthest.c._mode='superman'; return farthest.c; }
  // 아주 가까운 것 (손 뻗기 범위)
  if(nearest.d<=GRAB_DIST){ nearest.c._mode='grab'; return nearest.c; }
  // 점프 범위
  nearest.c._mode='jump'; return nearest.c;
}

// ════════════════════════════════════
//  잡기
// ════════════════════════════════════
function showResult(card){
  document.getElementById('result-name').textContent=card.name;
  resultPanel.classList.add('show');
  launchFireworks();
  playCatch();
  phase='done';
  stopBgMusic(); stopSteps();
  // 멈춰 버튼 비활성(흐릿하게), 2초 후 다시 버튼 등장
  stopBtn.disabled=true;
  resetBtn.style.display='none';
  setTimeout(()=>{
    resetBtn.style.display='block';
  }, 2000);
}

function doJumpAndCatch(card){
  phase='jumping';
  stopSteps(); stopBgMusic();
  prof.classList.add('stopped');
  profBody.classList.remove('reach-fwd','superman-arm');
  prof.classList.remove('jumping','superman-right','superman-left');

  const cardCX=card.x+card.w/2;
  const newDir=cardCX>(profX+50)?1:-1;
  profDir=newDir; updateProfVisual();

  const mode=card._mode||'jump';
  const isSuperman=(mode==='superman');
  const isGrab=(mode==='grab');

  showBubble(isSuperman?'슈퍼 교수님 출동! 🦸':'잡아야지! 😈');
  playStop();

  // [수정] 교수님 이동 목표 지점 계산 (자연스럽게 팔 뻗는 위치로)
  // 오른쪽(1)을 볼 땐 카드의 왼쪽편에 서야 하고, 왼쪽(-1)을 볼 땐 카드의 오른쪽편에 서야 함
  let targetX;
  if(profDir === 1) {
    targetX = card.x - 60; // 교수 너비 고려하여 왼쪽으로 이동
  } else {
    targetX = card.x + 10; // 오른쪽으로 이동
  }
  // 화면 밖으로 나가지 않게 보정
  targetX = Math.max(15, Math.min(SW-110, targetX));

  // 0.5s 대기 후 카드 슬로우다운 + 잡기 시작
  setTimeout(()=>{
    if(isSuperman){
      // ── 슈퍼맨 (빠르게 날아가서 채가기) ──
      setTimeout(()=>{ playSuperman(); },50);
      profBody.classList.add('superman-arm');
      prof.classList.add(profDir===1?'superman-right':'superman-left');

      // 0.9초 동안 목표지점으로 수평 이동
      prof.style.transition = 'left 0.9s cubic-bezier(0.4, 0, 0.6, 1)';
      setTimeout(() => {
          profX = targetX;
          prof.style.left = profX + 'px';
      }, 50);

      // 비행의 정점에서 카드 잡기
      setTimeout(()=>{
        card.caught=true;
        card.el.classList.add('caught');
        pulseCard(card);
      }, 950);

      // 착지 후
      setTimeout(()=>{
        prof.style.transition = '';
        prof.classList.remove('superman-right','superman-left');
        profBody.classList.remove('superman-arm');
        profBody.classList.add('reach-fwd');
        showBubble('잡았다!! 🎉');
        floatCardAboveProf(card,profX);
      }, 1900);

      // 결과 표시
      setTimeout(()=>{
        showResult(card);
      }, 3000);

    } else {
      // 카드 속도를 20%로 줄임 (슬로우 모션)
      cards.forEach(c=>{ if(!c.caught){ c._savedVx=c.vx; c._savedVy=c.vy; c.vx*=0.18; c.vy*=0.18; }});
      
      if(isGrab){
        // ── 손 뻗어 천천히 걸어가서 잡기 ──
        profBody.classList.add('reach-fwd');
        const startX=profX, dist2=Math.abs(targetX-startX);
        const steps=Math.max(20, Math.round(dist2/2));
        let step=0;
        const iv=setInterval(()=>{
          step++;
          const t=step/steps;
          const ease=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
          profX=startX+(targetX-startX)*ease;
          prof.style.left=profX+'px';
          if(step>=steps){
            clearInterval(iv);
            card.caught=true; card.el.classList.add('caught');
            pulseCard(card);
            showBubble('잡았다!! 🎉');
            // 0.6s 후 카드 위로 float
            setTimeout(()=>{
              floatCardAboveProf(card,profX);
              // 0.8s 더 기다린 후 결과
              setTimeout(()=>{ restoreCardSpeeds(); showResult(card); },1000);
            },600);
          }
        },35); // 35ms × steps ≈ 자연스러운 속도
      } else {
        // ── 점프 잡기 ──
        playJump();
        prof.classList.add('jumping');
        profBody.classList.add('reach-fwd');
        // 점프 정점에서 이동 + 잡기
        setTimeout(()=>{
          profX=targetX; prof.style.left=profX+'px';
          card.caught=true; card.el.classList.add('caught');
          pulseCard(card);
          showBubble('잡았다!! 🎉');
        },550);
        // 착지 후 float
        setTimeout(()=>{
          prof.classList.remove('jumping');
          floatCardAboveProf(card,profX);
        },1250);
        // 잠시 후 결과
        setTimeout(()=>{ restoreCardSpeeds(); showResult(card); },2200);
      }
    }
  },500);
}

// 카드 강조 (잡는 순간)
function pulseCard(card){
  card.el.style.transition='transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s';
  card.el.style.background='linear-gradient(135deg,rgba(255,140,40,0.97),rgba(255,50,50,0.97))';
  card.el.style.border='2px solid rgba(255,230,80,1)';
  card.el.style.color='#fff';
  card.el.style.boxShadow='0 0 0px rgba(255,160,40,0)';
  card.el.style.fontSize='20px';
  card.el.style.zIndex='30';
  // 짧은 펄스: 크게 → 원래
  setTimeout(()=>{ card.el.style.transform='scale(1.5)'; card.el.style.boxShadow='0 0 40px rgba(255,160,40,0.9),0 0 80px rgba(255,80,80,0.4)'; },20);
  setTimeout(()=>{ card.el.style.transform='scale(1.15)'; },300);
}

// 카드 교수 위로 이동
function floatCardAboveProf(card,tx){
  const groundY=SH-GROUND_OFFSET;
  card.el.style.transition='left 0.7s cubic-bezier(0.34,1.56,0.64,1),top 0.7s cubic-bezier(0.34,1.56,0.64,1),transform 0.7s';
  card.el.style.left=(tx+5)+'px';
  card.el.style.top=(groundY-270)+'px';
  card.el.style.transform='scale(1.3)';
}

function restoreCardSpeeds(){
  cards.forEach(c=>{ if(!c.caught&&c._savedVx!==undefined){ c.vx=c._savedVx; c.vy=c._savedVy; delete c._savedVx; delete c._savedVy; }});
}

// ════════════════════════════════════
//  말풍선
// ════════════════════════════════════
function showBubble(text,dur=0){
  clearTimeout(bubbleTimer);
  bubble.textContent=text; bubble.classList.add('visible');
  if(dur>0) bubbleTimer=setTimeout(hideBubble,dur);
}
function hideBubble(){ bubble.classList.remove('visible'); }

function pickWalkLine(){
  walkCount++;
  const pool=walkCount<=3?WALK_LINES_EARLY:WALK_LINES_LATE;
  return pool[Math.floor(Math.random()*pool.length)];
}
function startWalkBubbles(){
  clearInterval(walkInterval); clearTimeout(lateTimer);
  walkCount=0;
  showBubble(pickWalkLine(),5000);
  walkInterval=setInterval(()=>{ if(phase==='walking') showBubble(pickWalkLine(),5000); },7200);
  lateTimer=setTimeout(()=>{ if(phase==='walking') walkCount=99; },10000);
}

// ════════════════════════════════════
//  메인 루프
// ════════════════════════════════════
function loop(){
  if(phase==='walking'){ moveCards(); moveProf(); }
  else if(phase==='stopping'||phase==='jumping'||phase==='entering'||phase==='ready'){ moveCards(); }
  requestAnimationFrame(loop);
}

// ════════════════════════════════════
//  이벤트
// ════════════════════════════════════
stopBtn.addEventListener('click',()=>{
  if(phase==='ready'){
    resumeAC();
    phase='walking';
    stopBtn.disabled=true;
    stopBtn.textContent='탐색하는 중...';
    startBgMusic(); startSteps(); startWalkBubbles();

    // 10~17초 후 자동 멈춤
    setTimeout(()=>{
      phase='stopping';
      clearInterval(walkInterval); clearTimeout(lateTimer);
      stopSteps(); hideBubble();
      showBubble('어디보자... 👀');
      stopBgMusic();
      resetBtn.style.display='none';
      setTimeout(()=>{ const c=pickCard(); if(c) doJumpAndCatch(c); },500);
    }, 10000 + Math.random()*7000);
  }
});

resetBtn.addEventListener('click',()=>{
  resumeAC();
  currentTheme=Math.floor(Math.random()*THEMES.length);
  clearInterval(walkInterval); clearTimeout(lateTimer); clearTimeout(bubbleTimer);
  stopBgMusic(); stopSteps();

  // 버튼 초기 상태 복원
  resetBtn.style.display='none';
  stopBtn.style.display='block';
  stopBtn.disabled=true;  // 입장 중엔 비활성, 입장 끝나면 doEntrance에서 활성화
  stopBtn.textContent='시작';

  // 교수 애니메이션 즉시 중단 (cssText 방식 - 검은화면 없음)
  prof.style.transition='none';
  prof.style.animation='none';
  profBody.style.transition='none';
  profBody.style.animation='none';
  prof.classList.remove('stopped','jumping','superman-right','superman-left');
  profBody.classList.remove('reach-fwd','superman-arm','walk-right','walk-left');

  hideBubble();
  resultPanel.classList.remove('show');
  fwActive=false;
  fwP=[]; fwCtx.clearRect(0,0,SW,SH);

  // 배경 다시 그리기 (검은화면 방지: canvas는 항상 그대로)
  createCards();
  applyTheme();

  // 다음 두 프레임 후 스타일 초기화 후 입장
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    prof.style.transition='';
    prof.style.animation='';
    profBody.style.transition='';
    profBody.style.animation='';
    doEntrance();
  }));
});


// 클릭으로 AudioContext resume
document.getElementById('stage').addEventListener('click',resumeAC,{once:true});

// ════════════════════════════════════
//  폭죽
// ════════════════════════════════════
let fwP=[], fwActive=false;
function launchFireworks(){
  fwActive=true;
  fwCtx.clearRect(0,0,SW,SH);
  for(let i=0;i<10;i++) setTimeout(burst,i*175);
  let t=0;
  (function fw(){ if(!fwActive||t++>180){
    if(!fwActive) fwCtx.clearRect(0,0,SW,SH);
    return;
  }
    fwCtx.fillStyle='rgba(0,0,0,0.10)'; fwCtx.fillRect(0,0,SW,SH);
    fwP=fwP.filter(p=>p.life>0);
    fwP.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life--;
      fwCtx.globalAlpha=p.life/p.maxLife; fwCtx.fillStyle=p.col;
      fwCtx.beginPath();fwCtx.arc(p.x,p.y,p.r,0,Math.PI*2);fwCtx.fill();});
    fwCtx.globalAlpha=1; requestAnimationFrame(fw);})();
}
function burst(){
  const x=80+Math.random()*(SW-160),y=40+Math.random()*SH*.42;
  const cols=['#ffd32a','#ff6b6b','#48dbfb','#ff9ff3','#54a0ff','#1dd1a1','#ff9f43'];
  const col=cols[~~(Math.random()*cols.length)];
  for(let i=0;i<42;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*5+1;
    fwP.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:Math.random()*3+1,col,life:65,maxLife:65});
  }
}

// ════════════════════════════════════
//  시작
// ════════════════════════════════════
function startGame(classChar){
  const filename = classChar + '.txt';
  fetch(filename).then(r => {
    if(!r.ok) throw new Error('Network error');
    return r.text();
  }).then(txt => {
    const n = txt.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
    if(n.length) names = n;
    document.getElementById('start-screen').style.display = 'none';
    
    // 게임 초기화 및 시작
    currentTheme=Math.floor(Math.random()*THEMES.length);
    createCards();
    applyTheme();
    prof.style.bottom=(GROUND_OFFSET-2)+'px';
    updateProfVisual();
    loop();
    doEntrance();
  }).catch(e => alert('파일 로드 실패: ' + e.message));
}
</script>
