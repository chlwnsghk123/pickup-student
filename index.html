<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>교수의 답변자 뽑기</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="stage">
  <canvas id="bg-canvas" width="800" height="600"></canvas>
  <canvas id="fireworks" width="800" height="600"></canvas>
  <div id="scene"></div>

  <div id="professor">
    <div id="prof-body" class="walk-right">
      <div id="speech-bubble"></div>
      <div id="prof-face">
        <img id="prof-img" src="img/prof-face.jpg" alt="교수님">
      </div>
      <div id="prof-torso">
        <div id="prof-left-arm"></div>
        <div id="prof-right-arm"></div>
      </div>
      <div id="prof-legs">
        <div class="leg left"></div>
        <div class="leg right"></div>
      </div>
    </div>
  </div>

  <div id="ui">
    <button id="stop-btn">시작</button>
    <button id="reset-btn">🔄 다시</button>
  </div>

  <div id="result-panel">
    <div id="result-label">🎯 오늘의 답변자</div>
    <div id="result-name"></div>
    <div id="result-sub">답변해 주세요! 🎤</div>
  </div>
</div>

<div id="start-screen">
  <div class="menu-box">
    <h1>🎓 답변자 추첨기</h1>
    <div id="password-section">
      <p>비밀번호를 입력하세요</p>
      <input type="password" id="password-input" autocomplete="off">
      <button id="password-submit">입장</button>
    </div>
    <div id="class-section" style="display: none;">
      <p>반을 선택해주세요</p>
      <div class="menu-btns">
        <button onclick="startGame('A')">A반</button>
        <button onclick="startGame('B')">B반</button>
      </div>
    </div>
  </div>
</div>

<!-- JavaScript (순서 중요: 의존성에 따라 로드) -->
<script src="js/themes.js"></script>
<script src="js/audio.js"></script>
<script src="js/stage.js"></script>
<script src="js/movement.js"></script>
<script src="js/ui.js"></script>
<script src="js/fireworks.js"></script>
<script src="js/animation.js"></script>
<script src="js/main.js"></script>
</body>
</html>
